<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin-when-cross-origin">
    <title>Versapay Node.js Checkout</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .checkout-container { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        #versapay-container { border: 1px solid #ddd; margin-bottom: 20px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h1>Checkout</h1>

    <div class="form-group">
        <label>Total Amount</label>
        <input type="text" id="cart-total" value="100.00" readonly>
    </div>

    <!-- Billing Info (Simplificado) -->
    <h3>Billing Address</h3>
    <div class="form-group"><input type="text" id="billing_name" placeholder="First Name" value="John"></div>
    <div class="form-group"><input type="text" id="billing_last_name" placeholder="Last Name" value="Doe"></div>
    <div class="form-group"><input type="text" id="billing_email" placeholder="Email" value="john@example.com"></div>

    <!-- Versapay Container -->
    <h3>Payment</h3>
    <div id="versapay-container" style="height:360px; width:100%;"></div>

    <button id="place_order" disabled>Place Order</button>
    <div id="error-message" class="error"></div>
</div>

<!-- Cargar SDK de Versapay dinámicamente desde client.js -->
<script src="client.js"></script>
</body>
</html>
